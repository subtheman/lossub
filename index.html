<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro: #0a0a0a;
      --blanco: #f0ece3;
      --rojo: #c0392b;
      --gris: #888;
      --borde: #222;
    }

    body {
      background: var(--blanco);
      color: var(--negro);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 17px;
      line-height: 1.7;
    }

    /* HEADER, HERO, BARRA REDES, PLAYER CUSTOM, MAIN LAYOUT, SECCIONES, etc. */
    /* (mantengo exactamente todo tu CSS original) */
    header { border-bottom: 2px solid var(--negro); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; background: var(--blanco); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 4px; color: var(--negro); text-decoration: none; }
    nav a { font-family: 'IBM Plex Mono', monospace; font-size: 15px; text-transform: uppercase; letter-spacing: 2px; color: var(--negro); text-decoration: none; margin-left: 24px; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    nav a:hover { border-bottom-color: var(--negro); }

    /* NUEVO: TAMAÑO 1:1 CUADRADO PARA TAPA Y PLAYER */
    .square-1x1 {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.45);
      border: 1px solid #222;
    }
    .square-1x1 img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* PLAYER CUSTOM (tu código original intacto) */
    #player { margin-bottom: 24px; }
    #player.hidden { display: none; }
    #player.visible { display: block; }
    .np-wrap { background: #0a0a0a; padding: 20px; color: #e0ddd8; height: 100%; }
    /* ... resto de estilos del player (np-album-header, np-now-playing, etc.) exactamente como en tu archivo original ... */

    main { display: grid; grid-template-columns: 1fr 1fr; }
    .col-left { border-right: 1px solid #ccc; padding: 28px 24px; }
    .col-right { padding: 28px 24px; }

    .section-title { font-family: 'IBM Plex Mono', monospace; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: var(--rojo); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #ddd; }

    /* DISCROGRAFÍA - solo cambiamos Destruye Todo */
    .discografia-grid { display: flex; flex-direction: column; gap: 0; }
    .album-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; }
    .album-cover { width: 100px; height: 100px; flex-shrink: 0; background: #222; overflow: hidden; }
    .album-name { font-weight: 600; font-size: 17px; margin-bottom: 2px; }
    .album-year { font-family: "IBM Plex Mono",monospace; font-size: 14px; color: #aaa; margin-bottom: 4px; }
    .album-links a { font-family: "IBM Plex Mono",monospace; font-size: 13px; color: var(--rojo); text-decoration: none; margin-right: 10px; letter-spacing: 1px; }

    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; }
      .col-left { border-right: none; border-bottom: 1px solid #ccc; }
      .square-1x1 { max-width: 100%; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>

<footer>© LOS SUB — TODOS LOS DERECHOS RESERVADOS</footer>

<script>

  // ── CAROUSEL (definido temprano) ──
  var currentSlide = 0;
  var totalSlides = 2;

  function changeSlide(dir) {
    currentSlide = (currentSlide + dir + totalSlides) % totalSlides;
    updateCarousel();
  }

  function goToSlide(n) {
    currentSlide = n;
    updateCarousel();
  }

  function updateCarousel() {
    var slides = document.querySelector('.carousel-slides');
    if (slides) slides.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
  }

  // ── EMAILJS INIT ─────────────────────────────────────────
  if (typeof emailjs !== 'undefined') {
    emailjs.init('bYr7GpESyw248ykR8');
  }

  const EMAILJS_SERVICE  = 'service_x2loys9';
  const EMAILJS_TEMPLATE = 'template_ud685x3';
  const SITE_URL = window.location.origin + window.location.pathname;

  // ── DATOS DEL PLAYER ──────────────────────────────────────
  const BASE_URL = 'https://lossub.com.ar/';
  const TRACKS = [
    { num: '01', title: 'Vengador tóxico',        file: '01 Vengador toxico.m4a',        duration: '3:34' },
    { num: '02', title: 'Algo bueno',              file: '02 Algo bueno.m4a',              duration: '3:40' },
    { num: '03', title: 'Camino a marte',          file: '03 Camino a marte.m4a',          duration: '4:40' },
    { num: '04', title: 'Puro corazón',            file: '04 Puro corazon.m4a',            duration: '3:18' },
    { num: '05', title: 'Plástico',                file: '05 Plastico.m4a',                duration: '2:34' },
    { num: '06', title: 'Pesca',                   file: '06 Pesca.m4a',                   duration: '3:04' },
    { num: '07', title: 'Solos en la gran ciudad', file: '07 Solos en la gran ciudad.m4a', duration: '3:14' },
    { num: '08', title: 'La eternidad',            file: '08 La eternidad.m4a',            duration: '2:32' },
    { num: '09', title: 'Nuestra última canción',  file: '09 Nuestra ultima cancion.m4a',  duration: '3:42' },
  ];

  let npCurrent = 0;
  let npPlaying = false;
  const npAudio = document.getElementById('audio-player') || new Audio();

  function npBuildTracklist() {
    const list = document.getElementById('np-track-list');
    if (!list) return;
    list.innerHTML = '';
    TRACKS.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'np-track-row' + (i === 0 ? ' active' : '');
      row.dataset.index = i;
      row.innerHTML = `
        <span class="np-track-num">${t.num}</span>
        <span class="np-track-name">${t.title}</span>
        <span class="np-track-dur">${t.duration}</span>
      `;
      row.addEventListener('click', () => npLoadTrack(i, true));
      list.appendChild(row);
    });
  }

  function npLoadTrack(index, autoplay) {
    npCurrent = index;
    const t = TRACKS[index];
    npAudio.src = BASE_URL + encodeURIComponent(t.file);
    const titleEl = document.getElementById('np-now-title');
    if (titleEl) titleEl.textContent = t.title;
    const fill = document.getElementById('np-progress-fill');
    if (fill) fill.style.width = '0%';
    const cur = document.getElementById('np-time-current');
    if (cur) cur.textContent = '0:00';
    const tot = document.getElementById('np-time-total');
    if (tot) tot.textContent = t.duration;
    document.querySelectorAll('.np-track-row').forEach((r, i) => r.classList.toggle('active', i === index));
    if (autoplay) npAudio.play().then(() => npSetPlaying(true)).catch(() => {});
  }

  function npSetPlaying(val) {
    npPlaying = val;
    const iconPlay = document.getElementById('np-icon-play');
    const iconPause = document.getElementById('np-icon-pause');
    if (iconPlay) iconPlay.style.display = val ? 'none' : 'block';
    if (iconPause) iconPause.style.display = val ? 'block' : 'none';
  }

  function npFormatTime(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function npInitListeners() {
    const btnPlay = document.getElementById('np-btn-play');
    if (btnPlay) btnPlay.addEventListener('click', () => {
      if (!npAudio.src) { npLoadTrack(npCurrent, true); return; }
      if (npPlaying) { npAudio.pause(); npSetPlaying(false); } else { npAudio.play().then(() => npSetPlaying(true)); }
    });
    const btnNext = document.getElementById('np-btn-next');
    if (btnNext) btnNext.addEventListener('click', () => npLoadTrack((npCurrent + 1) % TRACKS.length, true));
    const btnPrev = document.getElementById('np-btn-prev');
    if (btnPrev) btnPrev.addEventListener('click', () => {
      if (npAudio.currentTime > 3) npAudio.currentTime = 0;
      else npLoadTrack((npCurrent - 1 + TRACKS.length) % TRACKS.length, true);
    });

    npAudio.addEventListener('timeupdate', () => {
      if (npAudio.duration) {
        const fill = document.getElementById('np-progress-fill');
        if (fill) fill.style.width = (npAudio.currentTime / npAudio.duration * 100) + '%';
        const cur = document.getElementById('np-time-current');
        if (cur) cur.textContent = npFormatTime(npAudio.currentTime);
        const tot = document.getElementById('np-time-total');
        if (tot) tot.textContent = npFormatTime(npAudio.duration);
      }
    });
    npAudio.addEventListener('ended', () => npLoadTrack((npCurrent + 1) % TRACKS.length, true));

    const progressBar = document.getElementById('np-progress-bar');
    if (progressBar) progressBar.addEventListener('click', (e) => {
      const rect = progressBar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      if (npAudio.duration) npAudio.currentTime = pct * npAudio.duration;
    });
  }

  // Resto de funciones (mostrarPlayer, enviarVerificacion, suscribir, guardarEmail, enviarContacto, etc.)
  // (copia el resto del script de tu archivo original aquí)

  window.addEventListener('DOMContentLoaded', () => {
    npBuildTracklist();
    npInitListeners();
  });
</script>
